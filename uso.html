<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Entrada de Uso | Roleta Eden</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="use-page">
    <main class="page-shell">
      <a class="back-link" href="./index.html">Voltar para a entrada</a>
      <section class="panel use-panel">
        <div class="copy-block">
          <p class="eyebrow">Entrada de Uso</p>
          <h1 id="wheel-title">Roleta de Brindes</h1>
          <p id="wheel-subtitle">
            Gire a roleta, descubra seu brinde e tire um print da tela.
          </p>
        </div>

        <div class="wheel-area">
          <div class="wheel-frame">
            <div class="pointer"></div>
            <canvas id="wheel-canvas" width="420" height="420"></canvas>
            <div class="wheel-center"></div>
          </div>
          <button id="spin-button" class="primary-button">Girar roleta</button>
        </div>

        <div class="result-box" id="result-box">
          <strong>Seu brinde aparecera aqui.</strong>
          <span>Tire um print assim que a roleta parar.</span>
        </div>
      </section>
    </main>

    <script src="./uso.js"></script>
  </body>
</html>
